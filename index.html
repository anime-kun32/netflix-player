<!DOCTYPE html>
<html>
<head>
    <title>Black Mirror</title>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <link rel='manifest' href='manifest.webmanifest'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body onkeydown="key()" onload="load_video()" class="naoSelecionavel">
    
    <div id="loading" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none;">
        <img src="loading.png" alt="Loading..." style="width: 100px; height: 100px;">
    </div>

    <div onmousemove="hover()" id="overlay">
        <div id="text">
            <span style="font-size:20px; opacity: 0.5;">Você está assistindo a</span><br>
            <span style="font-size:60px;" id="nome2">Black Mirror</span>
        </div>
    </div>

    <div onclick="play()">
        <video onmousemove="hover()" autoplay idmyVideo" src="https://www.googleapis.com/drive/v3/files/1vIHuov5jaThUfZocNhUYhoWRBfLLuAdj?alt=media&key=YOUR_API_KEY"></video>
    </div>

    <div onmousemove="hover()" id="content" class="content">
        <div class="chrome">
            <input type="range" min="0" onchange="video_time_update();hover();" oninput="video_time_update();hover()" value="0" id="video_slider"/>
        </div>
        <div style="position:absolute; bottom:10px;">
            <i id="play" onclick="play()" class="material-icons" style="font-size: 40px; padding: 10px;">pause</i> 
            <i onclick="replay(10)" class="material-icons" style="font-size: 40px; padding: 10px;">replay_10</i> 
            <i onclick="replay(5)" class="material-icons" style="font-size: 40px; padding: 10px;">replay_5</i> 
            <i id="volume" onclick="volume()" class="material-icons" style="font-size: 40px; padding: 10px;">volume_up</i> 
            <a href="back.html"><img src="back.png" style="width: 40px; height: 40px; padding: 10px;"></a>
            <span="font-weight: bold; position: absolute; bottom:10px; white-space: nowrap; padding: 10px;" id="nome">Black Mirror</span>
        </div>
        <div="right: 10px; position: absolute; bottom:10px;">
            <div class="tooltip">
                <i class="material-icons" style="font-size: 40px; padding: 10px;">help_outline</i>
                <span class="tooltiptext">Feito por <a href="https://github.com/pedroaf0">Pedroaf0</a></span>
            </div>
            <i class="material-icons" style="font-size: 40px; padding: 10px;">subtitles</i>
            <i id="full" onclick="full()" class="material-icons" style="font-size: 40px; padding: 10px;">fullscreen</i>
        </div>
    </div>

    <script>
        // Show loading image while video is loading
        document.getElementById("myVideo").addEventListener("loadstart", function() {
            document.getElementById("loading").style.display = "block";
        });

        document.getElementById("myVideo").addEventListener("loadeddata", function() {
            document.getElementById("loading").style.display = "none";
        });

        // Add service worker
        if ("serviceWorker" in navigator) {
            if (navigator.serviceWorker.controller) {
                console.log("[PWA Builder] Active service worker found, no need to register");
            } else {
                navigator.serviceWorker.register("pwabuilder-sw.js", { scope: "./" }).then(function (reg) {
                    console.log("[PWA Builder] Service worker has been registered, scope: " + reg.scope);
                }            }
        }
    </script>
    <script src="vibra.js"></script>
    <script src="js.js"></script>
</body>
</html>
